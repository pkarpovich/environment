# Treat macOS Option as Alt instead of as compose key.
# Without this, Option+letter sends Unicode (e.g. Option+a → å) instead of Alt+a,
# so any Alt-based keybind in zellij/vim/etc. silently fails.
macos_option_as_alt yes

# Pass through all Ctrl+Shift+* keys to the inner mux (zellij).
# Without this, kitty intercepts them for its own actions
# (font resize, tab management, scroll, etc.) and zellij never sees them.
clear_all_shortcuts yes

# Keep clipboard on Cmd (macOS native, doesn't conflict with zellij).
map cmd+c   copy_to_clipboard
map cmd+v   paste_from_clipboard
map cmd+q   quit
