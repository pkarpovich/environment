settings:
  log_dir: "./logs"
  loki:
    url: "http://192.168.198.3:3100"
    labels:
      host: "mba-2022"

scripts:
  tm-backup-checker:
    command: "python tm-backup-checker.py"
    context: "."
    venv: ".venv"
    env_file: ".env"
    env:
      PYTHONUNBUFFERED: "1"
    restart_policy: "always"
    max_restarts: 3
    cron: "0 0 */6 * * * *"
